        <a class="brand" href="../" aria-label="Homepage"><img class="brand-logo" src="../image/mine/logo.png" alt="" /><span class="brand-name">Kai Ren</span></a>
        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-menu">Menu</button>
        <div class="nav-links" id="site-menu">
          <a href="../"><i class="fa-solid fa-house" aria-hidden="true"></i><span>Home</span></a>
          <a href="../about/"><i class="fa-solid fa-user" aria-hidden="true"></i><span>About</span></a>
          <a href="../projects/" aria-current="page"><i class="fa-solid fa-diagram-project" aria-hidden="true"></i><span>Projects</span></a>

          <a href="../contact/"><i class="fa-solid fa-envelope" aria-hidden="true"></i><span>Contact</span></a>

            <i class="fa-solid fa-moon" aria-hidden="true"></i>
            <span class="theme-toggle-label">Dark</span>
          </button>
        </div>

    </header>

    <main id="main">
      <section class="page-hero shell">
        <p class="eyebrow">Research Portfolio</p>
        <h1>Projects</h1>
        <p class="lead narrow">
          Selected projects from smart agriculture, agricultural GIS decision support, lake
          hydrodynamic simulation, and environmental GIS.
        </p>
      </section>

      <section class="section shell">
        <div class="card-grid">
          <button class="project-card interactive-card" type="button" data-project="dayou-zuowei">
            <img src="../image/project/2022-project-oil-s.jpg" alt="Graphic for Dayou Zuowei oily sludge remediation project" />
            <span class="card-body">
              <span class="card-meta">2022 - 2023</span>
              <strong>大油作为: Oily Sludge Remediation Expert</strong>
              <span>
                Oily sludge remediation services combining hot-washing equipment, biosurfactants, and microbial agents.
              </span>
            </span>
          </button>
          <button class="project-card interactive-card" type="button" data-project="smart-agriculture">
            <img src="../image/project/2021-project-smart-agriculture-s.jpg" alt="Abstract map graphic for urban dynamics project" />
            <span class="card-body">
              <span class="card-meta">2021.09 - Present</span>
              <strong>Shaanxi Smart Agricultural Decision-Making System and Big Data Analysis Platform</strong>
              <span>
                Big-data analysis and decision support for dryland agriculture and smart orchards.
              </span>
            </span>
          </button>
          <button class="project-card interactive-card" type="button" data-project="xinjiang-cotton">
            <img src="../image/project/2020-project-xinjiang-cotton-s.jpg" alt="Abstract model layers for GeoAI project" />
            <span class="card-body">
              <span class="card-meta">2020.09 - Present</span>
              <strong>Xinjiang Cotton Decision Management Support System</strong>
              <span>
                GIS-based support for cotton production, plot management, field tasks, and agronomic decisions.
              </span>
            </span>
          </button>
          <button class="project-card interactive-card" type="button" data-project="dianchi-cyanobacteria">
            <img src="../image/project/2017-project-dianchi-cyanobacteria-s.jpg" alt="Abstract Earth observation graphic" />
            <span class="card-body">
              <span class="card-meta">2017.04 - 2018.05</span>
              <strong>Remote Sensing Monitoring and Early Warning System of Cyanobacteria Bloom in Dianchi Lake</strong>
              <span>
                Remote sensing retrieval, hydrodynamic modeling, and visual simulation of cyanobacteria bloom drift.
              </span>
            </span>
          </button>
          <button class="project-card interactive-card" type="button" data-project="dianchi-chla">
            <img src="../image/project/2017-project-dianchi-chla-s.jpg" alt="Graphic for Chl-a concentration visualization in Dianchi Lake" />
            <span class="card-body">
              <span class="card-meta">2017.04 - 2018.05</span>
              <strong>Visualization of Chl-a Concentration in Dianchi Lake</strong>
              <span>
                Grid-based Chl-a concentration simulation and VTK visualization under hydrodynamic conditions.
              </span>
            </span>
          </button>
          <button class="project-card interactive-card" type="button" data-project="dianchi-flow">
            <img src="../image/project/2017-project-dianchi-flow-s.jpg" alt="Graphic for flow field visualization in Dianchi Lake" />
            <span class="card-body">
              <span class="card-meta">2017.04 - 2018.05</span>
              <strong>Visualization of Flow Field in Dianchi Lake</strong>
              <span>
                Vector-arrow visualization of simulated lake flow direction and velocity.
              </span>
            </span>
          </button>
          <button class="project-card interactive-card" type="button" data-project="underground-space">
            <img src="../image/project/2017-project-underground-space-s.jpg" alt="Graphic for underground space 3D modeling system" />
            <span class="card-body">
              <span class="card-meta">Software Copyright</span>
              <strong>3D Modeling and Analysis System of Underground Space</strong>
              <span>
                Urban underground 3D modeling, mesh generation, borehole data management, and spatial analysis.
              </span>
            </span>
          </button>
          <button class="project-card interactive-card" type="button" data-project="groundwater-vulnerability">
            <img src="../image/project/2017-project-pizhou-groundwater-s.jpg" alt="Abstract map graphic for groundwater vulnerability project" />
            <span class="card-body">
              <span class="card-meta">2017.04 - 2018.05</span>
              <strong>Groundwater Vulnerability Assessment in Pizhou City</strong>
              <span>
                Groundwater vulnerability assessment and mapping based on ArcGIS, C#, and expert-weighted evaluation.
              </span>
            </span>
          </button>
        </div>
      </section>
    </main>

          <img class="footer-logo-white" src="../image/mine/NNU-logo-white.png" alt="" />

        </span>
